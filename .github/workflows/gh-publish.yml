name: gh-publish

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and copy project files
        run: |
          PROJECT_PATH=$(find . -name "project.godot" -type f | head -1 | xargs dirname)
          if [ -n "$PROJECT_PATH" ] && [ "$PROJECT_PATH" != "." ]; then
            cp -r $PROJECT_PATH/* .
          fi

      - name: Setup Godot
        uses: lihop/setup-godot@v3
        with:
          version: 4.2.1  # Используйте стабильную версию
          export-templates: true

      - name: Export game
        run: |
          mkdir -p builds
          godot --headless --export-release "Linux/X11" ./builds/game.x86_64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 2dgame-build
          path: build/







