name: godot-ci
on:
  push:
    branches: [ main ]

jobs:
  export-game:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export Game
        run: |
          mkdir -p build/windows
          godot --headless --export-release "2dgame-windows" build/windows/game.exe

      - name: Upload Release
        uses: ncipollo/release-action@v1.18.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: build/windows/game.exe
          allowUpdates: true
