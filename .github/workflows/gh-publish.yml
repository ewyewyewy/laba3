name: godot-ci
on:
  push:
    branches: [ main ]
env:
  GODOT_VERSION: 4.6.1

jobs:
  export-game:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1-mono
    permissions:
      contents: write
    name: Export game
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
      - name: Godot Export
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          relative_project_path: ./platformer
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: create release
        uses: ncipollo/release-action@v1.18.0
        with:
          token: ${{ secrets.GH_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
